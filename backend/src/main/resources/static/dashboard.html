<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SentiGuard - 舆情监测</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
<style>
:root {
  --bg: #edf2f6; --surface: #fff; --ink: #172331; --muted: #647386;
  --line: #d7e1ea; --nav: #243545; --nav-dark: #192938;
  --blue: #1f78b5; --green: #158147; --red: #c93a3a; --amber: #a65f00;
  --green-soft: #ddf5e7; --red-soft: #fde8e8; --amber-soft: #fff0cc;
  --shadow: 0 18px 38px rgba(21,38,55,0.09);
  --shadow-soft: 0 10px 22px rgba(21,38,55,0.06);
}
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; color: var(--ink); background: var(--bg); font-family: "Microsoft YaHei",Arial,sans-serif; }
button, input { font: inherit; } button { border: 0; cursor: pointer; }
.app { min-height: 100vh; display: grid; grid-template-columns: 260px minmax(0,1fr); }
.sidebar { background: var(--nav); color: #dbe7f0; border-right:1px solid #182635; }
.brand { height: 82px; display: flex; align-items: center; gap: 12px; padding: 0 22px; background: var(--nav-dark); border-bottom: 1px solid rgba(255,255,255,0.08); }
.brand-mark { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 7px; color: #102a3b; background: #f3c84b; font-weight: 900; }
.brand-name { font-size: 18px; font-weight: 900; line-height: 1.1; }
.brand-desc { margin-top: 4px; color: #9eb0bf; font-size: 12px; }
.nav-block { padding: 18px 14px 8px; }
.nav-title { padding: 0 10px 9px; color: #91a5b6; font-size: 12px; font-weight: 900; }
.nav-item { width: 100%; min-height: 44px; display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 10px; padding: 0 12px; border-radius: 6px; background: transparent; color: #dbe7f0; text-align: left; font-weight: 900; }
.nav-item + .nav-item { margin-top: 5px; }
.nav-item.active { background: var(--blue); color: #fff; }
.main { min-width: 0; display: grid; grid-template-rows: 66px minmax(0,1fr); }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 0 28px; background: #fff; border-bottom: 1px solid var(--line); }
.crumb { color: var(--muted); font-size: 13px; font-weight: 900; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.content { padding: 24px 28px 36px; overflow: auto; }
.metrics { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
.metric { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow-soft); padding: 15px 17px; }
.metric-label { color: var(--muted); font-size: 13px; font-weight: 900; }
.metric-value { margin-top: 7px; color: #14344d; font-size: 25px; font-weight: 900; }
.metric-note { margin-top: 4px; color: var(--muted); font-size: 12px; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-box { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow-soft); padding: 16px; }
.chart-box .chart-title { font-size: 15px; font-weight: 900; color: #1f78b5; margin-bottom: 10px; }
.chart-box .chart-inner { width: 100%; height: 340px; }
.chart-box.wide { grid-column: 1/-1; }
.table-box { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; }
.table-head { min-height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 12px; border-bottom: 1px solid var(--line); }
.table-title { color: var(--blue); font-size: 17px; font-weight: 900; }
.table-sub { color: var(--muted); font-size: 12px; font-weight: 900; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid #edf2f6; font-size: 13px; }
th { color: var(--muted); font-weight: 900; background: #f8fbfd; }
tr:hover td { background: #f8fbfd; }
.tag { display: inline-block; padding: 2px 10px; border-radius: 5px; font-size: 12px; font-weight: 900; }
.tag.pos { color: var(--green); background: var(--green-soft); }
.tag.neg { color: var(--red); background: var(--red-soft); }
.tag.neu { color: var(--amber); background: var(--amber-soft); }
.tag.low { color: var(--green); background: var(--green-soft); }
.tag.medium { color: var(--amber); background: var(--amber-soft); }
.tag.high { color: var(--red); background: var(--red-soft); }
.btn { height: 36px; min-width: 80px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 0 12px; border-radius: 6px; color: #fff; background: var(--blue); font-weight: 900; font-size: 13px; }
.btn.ghost { color: #24475f; background: #fff; border: 1px solid var(--line); }
.btn.small { height: 28px; min-width: 50px; font-size: 12px; padding: 0 8px; }
.toast { position: fixed; right: 24px; bottom: 24px; max-width: 420px; padding: 13px 15px; border-radius: 8px; color: #fff; background: #1f2937; box-shadow: var(--shadow); opacity: 0; transform: translateY(10px); transition: 0.2s; z-index: 30; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: var(--red); }
.toast.success { background: var(--green); }
@media(max-width:1180px){ .metrics,.charts { grid-template-columns: 1fr; } .chart-box.wide { grid-column: 1; } }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">SG</div>
    <div>
      <div class="brand-name">SentiGuard</div>
      <div class="brand-desc">舆情监测与事实核查平台</div>
    </div>
  </div>
  <div class="nav-block">
    <div class="nav-title">功能导航</div>
    <a href="/dashboard.html" class="nav-item active"><span>🔥</span><span>舆情监测</span><span class="tag pos" style="font-size:11px;">实时</span></a>
    <a href="/" class="nav-item"><span>✓</span><span>事实核查</span></a>
  </div>
</aside>

<main class="main">
<header class="topbar">
  <div class="crumb">平台工作台 / 实时舆情监测</div>
  <div class="topbar-right">
    <span id="updateTime" style="color:var(--muted);font-size:12px;">加载中...</span>
    <button id="collectBtn" class="btn" onclick="manualCollect()">🔄 立即更新</button>
    <span id="currentUser" style="color:var(--blue);font-weight:900;font-size:13px;">用户</span>
    <button id="logoutBtn" class="btn ghost small" onclick="logout()">退出</button>
  </div>
</header>

<section class="content">
  <div class="metrics">
    <div class="metric"><div class="metric-label">当前热点数</div><div id="mHotspots" class="metric-value">-</div><div class="metric-note">24小时内检测到的热点事件</div></div>
    <div class="metric"><div class="metric-label">负面情感占比</div><div id="mNeg" class="metric-value" style="color:var(--red)">-</div><div class="metric-note">高风险事件需重点关注</div></div>
    <div class="metric"><div class="metric-label">高风险事件</div><div id="mHighRisk" class="metric-value" style="color:var(--red)">-</div><div class="metric-note">负面情感占比过高的事件</div></div>
    <div class="metric"><div class="metric-label">采集新闻数</div><div id="mNews" class="metric-value">-</div><div class="metric-note" id="mCollectTime">最近采集：-</div></div>
  </div>

  <div class="charts">
    <div class="chart-box"><div class="chart-title">📊 热度 Top10</div><div id="chartHeat" class="chart-inner"></div></div>
    <div class="chart-box"><div class="chart-title">🥧 情感占比</div><div id="chartSentiment" class="chart-inner"></div></div>
    <div class="chart-box"><div class="chart-title">⚠️ 风险分布</div><div id="chartRisk" class="chart-inner"></div></div>
    <div class="chart-box"><div class="chart-title">☁️ 关键词词云</div><div id="chartWordcloud" class="chart-inner"></div></div>
  </div>

  <div class="table-box">
    <div class="table-head">
      <div><div class="table-title">热点事件列表</div><div class="table-sub">按热度排序，点击操作查看详情或发起核查</div></div>
    </div>
    <div style="overflow-x:auto;">
      <table><thead><tr><th>排名</th><th>热点事件</th><th>热度</th><th>情感</th><th>风险</th><th>新闻数</th><th>关键词</th><th>操作</th></tr></thead><tbody id="tableBody"><tr><td colspan="8" style="text-align:center;color:var(--muted);padding:40px;">数据加载中...</td></tr></tbody></table>
    </div>
  </div>
</section>
</main>
</div>

<div id="toast" class="toast"></div>

<script>
// ===== Auth =====
function getToken(){ return localStorage.getItem('sg_token'); }
function logout(){ localStorage.clear(); window.location.href='/login.html'; }
if(!getToken()){ window.location.href='/login.html'; }

var nickname = localStorage.getItem('sg_nickname')||localStorage.getItem('sg_username')||'用户';
document.getElementById('currentUser').textContent = nickname;
document.getElementById('logoutBtn').addEventListener('click', logout);

// ===== API =====
async function api(url, opts){
  opts = opts || {};
  var headers = {'Content-Type':'application/json'};
  headers['Authorization'] = 'Bearer ' + getToken();
  var resp = await fetch(url, {headers:headers, method:opts.method||'GET', body:opts.body});
  var data = await resp.json();
  if(!resp.ok || (data.code && data.code>=400)) throw new Error(data.message||'请求失败');
  return data.data !== undefined ? data.data : data;
}

function showToast(msg, type){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show '+(type||'');
  setTimeout(function(){ t.className='toast'; }, 3000);
}

// ===== Charts =====
var chartHeat = echarts.init(document.getElementById('chartHeat'));
var chartSentiment = echarts.init(document.getElementById('chartSentiment'));
var chartRisk = echarts.init(document.getElementById('chartRisk'));
var chartWordcloud = echarts.init(document.getElementById('chartWordcloud'));

function renderCharts(hotspots, stats){
  // Heat bar chart
  var top10 = hotspots.slice(0,10);
  chartHeat.setOption({
    tooltip:{trigger:'axis'},
    grid:{left:120,right:20,top:10,bottom:30},
    xAxis:{type:'value',name:'热度'},
    yAxis:{type:'category',data:top10.map(function(h){return h.name.length>12?h.name.substr(0,12)+'...':h.name;}).reverse(),axisLabel:{fontSize:11}},
    series:[{type:'bar',data:top10.map(function(h){return h.heat;}).reverse(),
      itemStyle:{color:function(p){
        var r=top10[top10.length-1-p.dataIndex].riskLevel;
        return r==='high'?'#c93a3a':r==='medium'?'#a65f00':'#1f78b5';
      }}
    }]
  });

  // Sentiment ring chart
  chartSentiment.setOption({
    tooltip:{trigger:'item'},
    legend:{bottom:0},
    series:[{type:'pie',radius:['45%','72%'],center:['50%','45%'],
      label:{formatter:'{b}\n{d}%'},
      data:[
        {value:Number(stats.posRatio||0),name:'正面',itemStyle:{color:'#158147'}},
        {value:Number(stats.neuRatio||0),name:'中性',itemStyle:{color:'#a65f00'}},
        {value:Number(stats.negRatio||0),name:'负面',itemStyle:{color:'#c93a3a'}}
      ]
    }]
  });

  // Risk distribution
  chartRisk.setOption({
    tooltip:{trigger:'item'},
    legend:{bottom:0},
    series:[{type:'pie',radius:'55%',center:['50%','45%'],
      label:{formatter:'{b}: {c}'},
      data:[
        {value:stats.lowRiskCount||0,name:'低风险',itemStyle:{color:'#158147'}},
        {value:stats.mediumRiskCount||0,name:'中风险',itemStyle:{color:'#a65f00'}},
        {value:stats.highRiskCount||0,name:'高风险',itemStyle:{color:'#c93a3a'}}
      ]
    }]
  });

  // Wordcloud
  var words = [];
  hotspots.forEach(function(h){
    if(h.keywords) h.keywords.forEach(function(k){
      words.push({name:k.word,value:k.weight});
    });
  });
  // dedup by max weight
  var wordMap = {};
  words.forEach(function(w){
    if(!wordMap[w.name] || wordMap[w.name]<w.value) wordMap[w.name]=w.value;
  });
  var wordList = Object.keys(wordMap).map(function(k){return {name:k,value:wordMap[k]};});
  wordList.sort(function(a,b){return b.value-a.value;});
  wordList = wordList.slice(0,50);

  chartWordcloud.setOption({
    tooltip:{show:true},
    series:[{type:'wordCloud',
      shape:'circle',
      sizeRange:[14,48],
      rotationRange:[-45,45],
      gridSize:8,
      drawOutOfBound:false,
      textStyle:{fontFamily:'Microsoft YaHei',fontWeight:'bold',
        color:function(){var colors=['#1f78b5','#158147','#a65f00','#c93a3a','#647386'];return colors[Math.floor(Math.random()*colors.length)];}
      },
      data:wordList
    }]
  });
}

function renderTable(hotspots){
  var rows = hotspots.map(function(h){
    var kws = (h.keywords||[]).slice(0,3).map(function(k){return k.word;}).join(', ');
    return '<tr>'+
      '<td><b>#'+h.rank+'</b></td>'+
      '<td><a href="https://www.baidu.com/s?wd='+encodeURIComponent(h.name)+'" target="_blank" style="color:var(--ink);text-decoration:none;font-weight:900;">'+escapeHtml(h.name)+'</a></td>'+
      '<td><b>'+h.heat+'</b></td>'+
      '<td><span class="tag '+h.sentimentLabel+'">'+labelText(h.sentimentLabel)+'</span></td>'+
      '<td><span class="tag '+h.riskLevel+'">'+riskText(h.riskLevel)+'</span></td>'+
      '<td>'+h.newsCount+'条</td>'+
      '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(kws)+'</td>'+
      '<td><a href="/?hotEventId='+h.id+'" class="btn small ghost" style="margin-right:4px;">核查</a></td>'+
      '</tr>';
  }).join('');
  document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:40px;">暂无热点数据</td></tr>';
}

function labelText(l){ return l==='pos'?'正面':l==='neg'?'负面':'中性'; }
function riskText(r){ return r==='high'?'高':r==='medium'?'中':'低'; }
function escapeHtml(v){ return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== Data =====
var REFRESH_INTERVAL = 10 * 60 * 1000; // 10 min

async function loadData(){
  try {
    var stats = await api('/api/dashboard/stats');
    var hotspots = await api('/api/hotspots?limit=50');

    document.getElementById('mHotspots').textContent = stats.totalHotspots;
    document.getElementById('mNeg').textContent = (stats.negRatio||0)+'%';
    document.getElementById('mHighRisk').textContent = stats.highRiskCount;
    document.getElementById('mNews').textContent = stats.totalNews;
    document.getElementById('mCollectTime').textContent = '最近采集：'+stats.lastCollectTime;

    var now = new Date();
    document.getElementById('updateTime').textContent = '上次更新: '+now.toLocaleTimeString();

    renderCharts(hotspots, stats);
    renderTable(hotspots);
  } catch(e){
    showToast('数据加载失败: '+e.message, 'error');
  }
}

async function manualCollect(){
  var btn = document.getElementById('collectBtn');
  btn.disabled = true; btn.textContent = '采集中...';
  try {
    var result = await api('/api/news/collect', {method:'POST'});
    showToast(result.message||'采集完成', 'success');
    setTimeout(loadData, 2000);
  } catch(e){
    showToast('采集失败: '+e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '🔄 立即更新';
  }
}

// ===== Init =====
loadData();
setInterval(loadData, REFRESH_INTERVAL);

// Responsive resize
window.addEventListener('resize', function(){
  chartHeat.resize();
  chartSentiment.resize();
  chartRisk.resize();
  chartWordcloud.resize();
});
</script>
</body>
</html>
